<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guestbook — Samantha.AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700;900&family=Space+Mono:wght@400;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070f;
  --bg2: #0d0d1a;
  --bg3: #111120;
  --purple: #8b5cf6;
  --purple-dim: rgba(139,92,246,0.15);
  --purple-border: rgba(139,92,246,0.3);
  --teal: #2dd4bf;
  --teal-dim: rgba(45,212,191,0.12);
  --teal-border: rgba(45,212,191,0.3);
  --white: #f8f8ff;
  --white-80: rgba(248,248,255,0.8);
  --white-60: rgba(248,248,255,0.6);
  --white-30: rgba(248,248,255,0.3);
  --white-10: rgba(248,248,255,0.1);
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.09);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Pretendard', sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 999; opacity: 0.5;
}

/* GNB */
.gnb {
  position: fixed; top: 0; left: 0; right: 0; height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; z-index: 500;
  background: rgba(7,7,15,0.75);
  backdrop-filter: blur(24px);
  border-bottom: 0.5px solid var(--glass-border);
}
.gnb-logo { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; color: var(--white); text-decoration: none; }
.gnb-logo em { color: var(--purple); font-style: normal; }
.gnb-nav { display: flex; align-items: center; gap: 24px; list-style: none; }
.gnb-nav a { font-size: 12px; color: var(--white-60); text-decoration: none; letter-spacing: 0.06em; transition: color 0.2s; }
.gnb-nav a:hover, .gnb-nav a.active { color: var(--white); }

/* GNB CTA */
.gnb-cta {
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  background: #f97316;
  border: 1px solid #fff;
  padding: 7px 18px;
  border-radius: 30px;
  text-decoration: none;
  letter-spacing: 0.04em;
  transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(249,115,22,0.3);
}
.gnb-cta:hover {
  background: #fb923c;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(249,115,22,0.5);
}

/* HERO */
.hero {
  padding: 140px 40px 60px;
  text-align: center;
  position: relative;
  background: radial-gradient(circle at 50% -20%, rgba(139,92,246,0.1) 0%, transparent 50%);
}
.hero-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--purple);
  letter-spacing: 0.2em; margin-bottom: 20px;
  display: block;
}
.hero-title {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 700; line-height: 1.2;
  margin-bottom: 24px;
}

/* GUESTBOOK CONTAINER */
.guestbook-container {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 40px 120px;
}

/* AUTH SECTION */
.auth-section {
  background: var(--bg2);
  border: 0.5px solid var(--glass-border);
  border-radius: 20px;
  padding: 30px;
  margin-bottom: 40px;
  text-align: center;
  transition: all 0.3s ease;
}
.auth-section:hover {
  border-color: var(--teal-border);
}
.auth-message {
  font-size: 16px;
  color: var(--white-80);
  margin-bottom: 20px;
  line-height: 1.5;
}
.login-btn, .logout-btn, .submit-btn {
  background: transparent;
  color: var(--teal);
  border: 1px solid var(--teal-border);
  padding: 10px 24px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: 'Pretendard', sans-serif;
}
.login-btn:hover, .logout-btn:hover, .submit-btn:hover {
  background: var(--teal-dim);
  border-color: var(--teal);
}

/* USER INFO */
.user-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  text-align: left;
}
.user-profile {
  display: flex;
  align-items: center;
  gap: 12px;
}
.user-profile img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
}
.user-name {
  font-weight: 600;
  color: var(--white);
  font-size: 15px;
}

/* WRITE FORM */
.write-form textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 16px;
  color: var(--white);
  font-family: 'Pretendard', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  resize: vertical;
  min-height: 100px;
  margin-bottom: 16px;
  transition: border-color 0.3s;
}
.write-form textarea:focus {
  outline: none;
  border-color: var(--purple);
}
.form-actions {
  text-align: right;
}

/* MESSAGES LIST */
.messages-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.message-card {
  background: var(--glass);
  border: 0.5px solid var(--glass-border);
  border-radius: 20px;
  padding: 24px;
  transition: all 0.3s ease;
}
.message-card:hover {
  background: rgba(255,255,255,0.06);
  border-color: var(--purple-dim);
}
.message-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.message-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}
.message-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.message-author {
  font-weight: 600;
  font-size: 14px;
  color: var(--white);
}
.message-date {
  font-size: 12px;
  color: var(--white-30);
  font-family: 'Space Mono', monospace;
}
.message-content {
  font-size: 15px;
  line-height: 1.6;
  color: var(--white-80);
  word-break: keep-all;
  white-space: pre-wrap;
}

/* FOOTER */
footer {
  border-top: 0.5px solid var(--glass-border);
  padding: 60px 40px; text-align: center;
}
.footer-logo { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; margin-bottom: 16px; }
.footer-logo em { color: var(--purple); font-style: normal; }
.footer-copy { font-size: 11px; color: var(--white-30); }

</style>
</head>
<body>

<nav class="gnb" id="gnb">
  <a href="index.html" class="gnb-logo">Samantha<em>.AI</em></a>
  <ul class="gnb-nav">
    <li><a href="peh.html">PEH</a></li>
    <li><a href="ip.html">IP</a></li>
    <li><a href="books.html">BOOKS</a></li>
    <li><a href="fna.html">F&A</a></li>
    <li><a href="support.html">SUPPORT</a></li>
    <li><a href="guestbook.html" class="active">GUESTBOOK</a></li>
  </ul>
  <a href="join.html" class="gnb-cta">회원가입</a>
</nav>

<section class="hero">
  <div class="hero-inner">
    <span class="hero-label">GUESTBOOK</span>
    <h1 class="hero-title">발자취를 남겨주세요,<br>환영합니다!</h1>
  </div>
</section>

<div class="guestbook-container">
  
  <!-- AUTH & WRITE SECTION -->
  <div class="auth-section" id="auth-section">
    <!-- Logged Out View -->
    <div id="logged-out-view">
      <p class="auth-message">사만다에게 방명록을 남기려면 Google 계정으로 로그인해 주세요. 💖</p>
      <button class="login-btn" id="login-btn">Google 로그인</button>
    </div>
    
    <!-- Logged In View -->
    <div id="logged-in-view" style="display: none;">
      <div class="user-info">
        <div class="user-profile">
          <img id="user-photo" src="" alt="Profile">
          <span class="user-name" id="user-name">사용자</span>
        </div>
        <button class="logout-btn" id="logout-btn">로그아웃</button>
      </div>
      <div class="write-form">
        <textarea id="message-input" placeholder="사만다에게 전하고 싶은 말을 자유롭게 남겨주세요!"></textarea>
        <div class="form-actions">
          <button class="submit-btn" id="submit-btn">방명록 남기기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MESSAGES LIST -->
  <div class="messages-list" id="messages-list">
    <!-- Messages will be dynamically rendered here -->
    <!-- Placeholder for loading -->
    <p style="text-align: center; color: var(--white-30); font-family: 'Space Mono';">Loading messages...</p>
  </div>

</div>

<footer>
  <div class="footer-logo">Samantha<em>.AI</em></div>
  <div class="footer-copy">© 2026 Samantha.AI.kr · Designed for your inspiration</div>
</footer>

<!-- Firebase Global Initialization Script -->
<script type="module" src="assets/js/firebase-config.js"></script>

<!-- Guestbook Application Logic -->
<script type="module">
  // Wait for Firebase to initialize (it will expose variables to window)
  window.addEventListener('load', () => {
    // Check if Firebase is configured
    if (!window.firebaseAuth || !window.firebaseDb) {
      document.getElementById('messages-list').innerHTML = '<p style="text-align: center; color: #f87171;">Firebase 연동이 아직 완료되지 않았습니다. (firebase-config.js 설정을 확인해주세요)</p>';
      return;
    }

    const { firebaseAuth, firebaseDb, firebaseProvider, signInWithPopup, signOut, onAuthStateChanged, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } = window;
    
    // UI Elements
    const loggedOutView = document.getElementById('logged-out-view');
    const loggedInView = document.getElementById('logged-in-view');
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const userPhoto = document.getElementById('user-photo');
    const userName = document.getElementById('user-name');
    const messageInput = document.getElementById('message-input');
    const submitBtn = document.getElementById('submit-btn');
    const messagesList = document.getElementById('messages-list');
    
    let currentUser = null;

    // Authentication State Listener
    onAuthStateChanged(firebaseAuth, (user) => {
      if (user) {
        // User is signed in
        currentUser = user;
        loggedOutView.style.display = 'none';
        loggedInView.style.display = 'block';
        userPhoto.src = user.photoURL || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none"><circle cx="20" cy="20" r="20" fill="%238b5cf6"/></svg>';
        userName.textContent = user.displayName || '익명 사용자';
      } else {
        // User is signed out
        currentUser = null;
        loggedInView.style.display = 'none';
        loggedOutView.style.display = 'block';
      }
    });

    // Login Action
    loginBtn.addEventListener('click', async () => {
      try {
        await signInWithPopup(firebaseAuth, firebaseProvider);
      } catch (error) {
        console.error("Login failed:", error);
        alert("로그인에 실패했습니다: " + error.message);
      }
    });

    // Logout Action
    logoutBtn.addEventListener('click', async () => {
      try {
        await signOut(firebaseAuth);
      } catch (error) {
        console.error("Logout failed:", error);
      }
    });

    // Submit Message
    submitBtn.addEventListener('click', async () => {
      const text = messageInput.value.trim();
      if (!text) {
        alert("방명록 내용을 입력해주세요!");
        return;
      }
      
      if (!currentUser) return;
      
      submitBtn.disabled = true;
      submitBtn.textContent = '저장 중...';

      try {
        await addDoc(collection(firebaseDb, "guestbook"), {
          text: text,
          authorName: currentUser.displayName || '익명 사용자',
          authorPhoto: currentUser.photoURL || '',
          authorId: currentUser.uid,
          createdAt: serverTimestamp()
        });
        messageInput.value = ''; // Clear input
      } catch (error) {
        console.error("Error adding document: ", error);
        alert("글 작성에 실패했습니다. Firebase 권한 설정을 확인해주세요.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '방명록 남기기';
      }
    });

    // Real-time Messages Listener
    const q = query(collection(firebaseDb, "guestbook"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
      messagesList.innerHTML = '';
      if (snapshot.empty) {
        messagesList.innerHTML = '<p style="text-align: center; color: var(--white-30); font-family: \'Space Mono\';">아직 방명록이 없습니다. 첫 번째 발자취를 남겨주세요!</p>';
        return;
      }
      
      snapshot.forEach((doc) => {
        const data = doc.data();
        const defaultPhoto = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none"><circle cx="18" cy="18" r="18" fill="%238b5cf6"/></svg>';
        
        let dateString = "방금 전";
        if (data.createdAt) {
          const date = data.createdAt.toDate();
          dateString = date.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        const messageEl = document.createElement('div');
        messageEl.className = 'message-card';
        messageEl.innerHTML = `
          <div class="message-header">
            <img src="${data.authorPhoto || defaultPhoto}" alt="Avatar" class="message-avatar" onerror="this.src='${defaultPhoto}'">
            <div class="message-meta">
              <span class="message-author">${escapeHtml(data.authorName)}</span>
              <span class="message-date">${dateString}</span>
            </div>
          </div>
          <div class="message-content">${escapeHtml(data.text)}</div>
        `;
        messagesList.appendChild(messageEl);
      });
    }, (error) => {
      console.error("Error fetching messages: ", error);
      messagesList.innerHTML = '<p style="text-align: center; color: #f87171;">데이터를 불러오는 중 오류가 발생했습니다.</p>';
    });

    // Helper to prevent XSS
    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return unsafe
           .replace(/&/g, "&amp;")
           .replace(/</g, "&lt;")
           .replace(/>/g, "&gt;")
           .replace(/"/g, "&quot;")
           .replace(/'/g, "&#039;");
    }
  });
</script>

</body>
</html>
